spring:
  application:
    name: event-gateway
    version: 1.0.0
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/event_gateway_db}
      database: event_gateway_db

server:
  port: ${SERVER_PORT:8080}

account-service:
  base-url: ${ACCOUNT_SERVICE_BASE_URL:http://localhost:8081}

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - com.github.itsdhanashri.eventledger.gateway.exception.AccountServiceException
  timelimiter:
    instances:
      accountService:
        timeout-duration: 5s
        cancel-running-future: true
  retry:
    instances:
      accountService:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.reactive.function.client.WebClientRequestException

logging:
  level:
    root: INFO
    com.github.itsdhanashri.eventledger: DEBUG
